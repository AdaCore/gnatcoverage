include:
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/check-issue@~latest
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/pre-commit@~latest
    inputs:
      # Do not run gnatformat in pre-commit as it is missing from the environment.
      # A specific CI job is used instead.
      pre-commit-skip: "gnatformat"

  - component: $CI_SERVER_FQDN/eng/gitlab-templates/gnatformat@~latest
    inputs:
      stage: check
      gnatformat-args: --no-project --check $(find tools/gnatcov -iname '*.ad[bs]')
      install-gnatformat: true
      install-gnatformat-extra-anod-args: -Qedge -Qdate=$GNATFORMAT_DATE

  - local: .gitlab-dates.yaml

  #TODO: workaround to allow dynamically setting the interruptible policy until https://gitlab.com/gitlab-org/gitlab/-/issues/194023 is implemented
  - local: utils/ci/interruptible.yml
    rules:
      - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

  # Run gnatsas on GNATcoverage sources
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/static-analysis@~latest
    inputs:
      job-name: .static-analysis # little trick to be able to extend the job's script
      anod-spec: gnatcov-gnatsas-check
      save-anod-logs: true

  # Build
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/build@~latest
    inputs:
      job-name: build
      anod-args: build --smart-rebuild gnatcov -Qinstr
      cpus: 16
      image: pe-base
      save-component: true

  # Build community gnatcov
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/build@~latest
    inputs:
      job-name: build-community
      stage: test
      anod-args: build --smart-rebuild gnatcov -Qno-c
      cpus: 16
      image: pe-base

  # Test gnatcov
  - component: $CI_SERVER_FQDN/eng/gitlab-templates/test@~latest
    inputs:
      linux: false # we provide our own runnable jobs
      anod-args: test gnatcov --minimal $TARGET_ARGS -Q$TEST_QUALIFIER
      generic-anod-ci-args: --add-dep eng/das/cov/gnatcoverage-extra
      needs: ["build:linux"]
      image: pe-base
      cpus: 16
      disk: 80

  - project: eng/gitlab-templates
    file: "/ci-templates-shared/anod-ci.yml"

workflow:
  rules:
    # Run the CI on merge requests only
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

variables:
   PACKAGE_BASE_NAME: gnatcoverage.tar.gz
   PACKAGE_ABSOLUTE_NAME: $CI_PROJECT_DIR/$PACKAGE_BASE_NAME
   CLANG_FORMAT_DATE: !reference [.dates, clang-format]
   GNATFORMAT_DATE: !reference [.dates, gnatformat]

stages:
  - build
  - test
  - check

build_docs:
  stage: build
  services:
     - image:pe-base
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" || ($CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH)
      changes:
        - doc/**/*
      when: always
  script:
    - generic_anod_ci
    - . /tmp/ci_env.sh
    - anod build gnatdas-doc -Qwarn-errors --latest
    - DOC_BSN=$(anod eval gnatdas-doc -Qwarn-errors build_space_name)
    - mv $ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$DOC_BSN/install/share/doc/gnatdas/ $CI_PROJECT_DIR
  artifacts:
    when:
      always
    paths:
      - gnatdas/pdf/gnatdas.pdf
      - gnatdas/html

.test_and_collect:
  extends: .test:linux:true
  variables:
    # Set native defaults
    TARGET_ARGS: ""
  script:
    # Setup the CI directory to host coverage results
    - mkdir $CI_PROJECT_DIR/coverage
    - !reference [.test:common, script]
    - TEST_DIR=$(anod info test gnatcov $TARGET_ARGS -Q$TEST_QUALIFIER --show working_dir)
    - mv $TEST_DIR/test/coverage/cobertura.xml $CI_PROJECT_DIR/coverage/cobertura.xml

  artifacts:
    when: always
    paths:
      - xunit-*.xml
      - coverage/cobertura.xml
      - anod-logs/

    reports:
      junit: xunit-*.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml

test_bin_traces:
  extends: .test_and_collect
  variables:
    TARGET_ARGS: --target=leon3-elf,,qemu
    TEST_QUALIFIER: RTS=embedded-leon3,-O0,instr

test_src_traces:
  extends: .test_and_collect
  variables:
    TEST_QUALIFIER: src-traces,instr

test_5.04a1_src_traces:
  extends: .test_and_collect
  variables:
    TEST_QUALIFIER: 5.04a1,src-traces,gpr-mode,instr
  script:
    - generic_anod_ci --add-dep eng/das/cov/gnatcoverage-extra
    - cat /tmp/ci_env.sh
    - . /tmp/ci_env.sh

    # GNAT 5.04a1 does not ship "ar" nor "ld". Make the ones from gnat/stable
    # available as if they were installed system-wide.
    - anod install gnat -Qstable
    - STABLE_GNAT_BSN=$(anod eval --primitive=install gnat -Qstable build_space_name)
    - STABLE_GNAT_PREFIX="$ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$STABLE_GNAT_BSN/install"
    - mkdir build-essentials
    - export PATH="$PWD/build-essentials:$PATH"
    - ln -s $STABLE_GNAT_PREFIX/bin/ar build-essentials/
    - ln -s $STABLE_GNAT_PREFIX/x86_64-pc-linux-gnu/bin/ld build-essentials/
    - !reference [.test_and_collect, script]

test_large:
  extends: .test_and_collect
  variables:
    TEST_QUALIFIER: large-tests,src-traces,instr

##########
# Checks #
##########

pre-commit:
  before_script:
    - generic_anod_ci
    - cat /tmp/ci_env.sh
    - . /tmp/ci_env.sh

    # Install the clang-format executable and make it available
    - anod install libclang -Qdate=$CLANG_FORMAT_DATE
    - eval `anod printenv libclang -Qdate=$CLANG_FORMAT_DATE`

    # Make Libadalang type hints available to Mypy
    - anod install libadalang
    - LAL_BSN=$(anod eval --primitive=build libadalang build_space_name)
    - LAL_INSTALL_DIR=$ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$LAL_BSN/install
    - export PYTHONPATH=$LAL_INSTALL_DIR/python

static-analysis:
  extends: .static-analysis
  variables:
    GNATSAS_OBJ_DIR: tools/gnatcov/obj64/prod
    GNATSAS_OUT_DIR: tools/gnatcov/analyzer
  script:
    - !reference [.static-analysis, script]
    # Make the job fail if there is at least one message
    - if grep 'unexpected messages' $BUILD_DIR/$GNATSAS_OBJ_DIR/results; then exit 1; fi
  after_script:
    - !reference [.static-analysis, after_script]
    - gl-sections open --collapsed "Move Infer frontend debug files"
    # Infer frontend debug files are generated next to sources, but gitlab can
    # only find artifacts in the CI_PROJECT_DIR. Moving all .test files is not
    # straightforward, let's copy everything.
    - mkdir -p $BUILD_DIR/tools/gnatcov
    - mkdir -p $CI_PROJECT_DIR/tools/gnatcov
    - rsync -avz $BUILD_DIR/tools/gnatcov/ $CI_PROJECT_DIR/tools/gnatcov
    - gl-sections close
  artifacts:
    when: always # the default is on_success and does not let us investigate
    paths:
      - anod-logs/
      # For reporting
      - $CI_PROJECT_DIR/**/gnatsas/*.json
      # For reviewing messages
      - $CI_PROJECT_DIR/**/$GNATSAS_OUT_DIR/**/*.sam
      - $CI_PROJECT_DIR/**/$GNATSAS_OUT_DIR/**/*.json
      # For debugging
      - $CI_PROJECT_DIR/**/gnatsas/**/*.stdout
      - $CI_PROJECT_DIR/**/gnatsas/**/*.stderr
      - $CI_PROJECT_DIR/**/gnatsas/**/*.log
      # Debugging Infer frontend non-determinism. Note that in case of
      # incremental run, those artifacts may be missing if capture/analysis is
      # not run again.
      - $CI_PROJECT_DIR/**/*.test
      - $CI_PROJECT_DIR/**/*.test.dot
    exclude:
      - $CI_PROJECT_DIR/**/gnatsas/**/*.inspector/backup_lvl1/*
      - $CI_PROJECT_DIR/**/$GNATSAS_OUT_DIR/**/*.annots/*
    reports:
      codequality: "**/gnatsas/*.json"

#################
# Optional jobs #
#################

# Optional job for block instrumentation.
#
# To be run when Ada or C instrumentation is modified to ensure the new
# changes are also compatible with block instrumentation.
test_block_instr:
  extends: .test_and_collect
  when: manual
  variables:
    TEST_QUALIFIER: src-traces,instr,block

# Optional job for light runtime testing on source traces. Dump trigger
# strategies differ on that runtime, and not all tests are compatible with
# this runtime depending on the needed features (e.g. --dump-channel=bin-file)
# or the test sources make use of Ada features not available on this runtime.
#
# Only needs to be run when large batches of src-trace specific tests are added,
# or if instrumentation code related to buffer dump is modified.
test_src_light:
  extends: .test_and_collect
  when: manual
  variables:
    TARGET_ARGS: --target=arm-elf,,qemu-stm32
    TEST_QUALIFIER: src-traces,instr,RTS=light-stm32f4

test_qualkit:
  interruptible: true
  services:
    - image:pe-base
    - cpu:16
    - mem:16
  stage: test
  needs: ["build:linux"]
  variables:
    # Variables required by .anod-ci-setup
    _CI_FRAGMENTS_BRANCH: main
    _PLAN: $CI_PROJECT_DIR/.gitlab-ci.plan
    _SAVE_ANOD_LOGS: "false"
    _GENERIC_ANOD_CI_ARGS: ""
  script:
    - !reference [.anod-ci-setup]

    # Use the gnatcov-qualrun and gnatcov-qualkit specs to run the
    # qualification testsuite and create a qualification kit
    - anod test gnatcov-qualrun --minimal -Qci
    - anod build gnatcov-qualkit --minimal -Qci
    - QUALKIT_BSN=$(anod eval --primitive=build gnatcov-qualkit -Qci build_space_name)
    - QUALRUN_BSN=$(anod eval --primitive=test gnatcov-qualrun -Qci build_space_name)
    - mkdir $CI_PROJECT_DIR/qualkits
    - mkdir $CI_PROJECT_DIR/qualrun
    - cp $ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$QUALRUN_BSN/tmp/attachment-testsuite_tree.tgz $CI_PROJECT_DIR/qualrun/
    - cp $ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$QUALKIT_BSN/install/*.zip $CI_PROJECT_DIR/qualkits/
    - cp $ANOD_DEFAULT_SANDBOX_DIR/x86_64-linux/$QUALKIT_BSN/install/consistency.log $CI_PROJECT_DIR/qualkits/
    - testsuite_reports
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes:
        paths:
          - "qualification/**/*"
          - "testsuite/Qualif/**/*"
          - "testsuite/STR/**/*"
          - "testsuite/SCOV/**/*"
        compare_to: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
  artifacts:
    when: always
    paths:
      - xunit-*.xml
      - qualkits/*.zip
      - qualkits/consistency.log
      - qualrun/attachment-testsuite_tree.tgz
    reports:
      junit: xunit-*.xml
